version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: menulens
      POSTGRES_PASSWORD: menulens
      POSTGRES_DB: menulens
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U menulens"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment the block below to enable NVIDIA GPU acceleration (~10-20× faster).
    # Requires: NVIDIA GPU + nvidia-container-toolkit installed on the host.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  backend:
    build:
      context: ..
      dockerfile: menulens/backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://menulens:menulens@db:5432/menulens
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=phi3:mini
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started

volumes:
  pgdata:
  ollama_data:
